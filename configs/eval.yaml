# @package _global_
#
# Evaluation entry. Extends the VIFT eval pattern (https://github.com/ybkurt/vift):
# adds `callbacks` and `experiment` defaults so overrides compose like `train.yaml`,
# and `model.tester` options for latent KITTI plots.
#
# GPU: includes `trainer: default` in defaults; run with e.g.
#   python src/eval.py trainer=gpu ckpt_path=...

defaults:
  - _self_
  - data: latent_kitti_vio # choose datamodule with `test_dataloader()` for evaluation
  - model: cavio
  - callbacks: default # required so experiment=... can override /callbacks (eval uses with_callbacks=False)
  - logger: many_loggers
  - paths: default
  - extras: default
  - hydra: default
  - trainer: default

  # same pattern as train.yaml: allows `experiment=foo` without `+experiment=foo`
  - experiment: null

task_name: "eval"

tags: ["dev"]

model:
  tester:
    plot_label: ???
    save_poses: true
# passing checkpoint path is necessary for evaluation
ckpt_path: ???
