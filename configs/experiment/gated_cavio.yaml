# @package _global_
#
# CAVIO-only experiment preset (same Hydra override role as VIFT `configs/experiment/*.yaml`;
# https://github.com/ybkurt/vift). Not present in upstream VIFT.

# GatedCAVIOPoseTransformer: cross-attn -> self-attn -> FFN with learnable per-layer tanh gates
# on cross-attention and FFN residuals (alpha init 0).
# To run (from repo root):
#   python src/train.py experiment=gated_cavio trainer=gpu

defaults:
  - override /data: latent_kitti_vio
  - override /model: cavio
  - override /callbacks: default
  - override /trainer: default

tags: ["CAVIO", "Gated CA"]

seed: 42

model:
  net:
    _target_: src.models.components.cavio_gated.GatedCAVIOPoseTransformer
  tester:
    plot_label: "Gated CAVIO"