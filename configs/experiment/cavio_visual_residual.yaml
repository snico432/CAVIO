# @package _global_
#
# CAVIO-only experiment preset (same Hydra override role as VIFT `configs/experiment/*.yaml`;
# https://github.com/ybkurt/vift). Not present in upstream VIFT.

# VisualResidualCAVIOPoseTransformer: learned visual residual injected into the IMU stream each layer.
# To run (from repo root):
#   python src/train.py experiment=cavio_visual_residual trainer=gpu

defaults:
  - override /data: latent_kitti_vio
  - override /model: cavio_visual_residual
  - override /callbacks: default
  - override /trainer: default

tags: ["CAVIO", "Visual Residual"]

seed: 42

model:
  tester:
    plot_label: "CAVIO Visual Residual"
