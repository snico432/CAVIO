# @package _global_
#
# CAVIO-only experiment preset (same Hydra override role as VIFT `configs/experiment/*.yaml`;
# https://github.com/ybkurt/vift). Not present in upstream VIFT.

# Same `CAVIOPoseTransformer` as default `model/cavio`, but criterion uses `DataWeightedRPMGPoseLoss`.
# To run (from repo root):
#   python src/train.py experiment=cavio_dataweighting trainer=gpu

defaults:
  - override /data: latent_kitti_vio
  - override /model: cavio
  - override /callbacks: default
  - override /trainer: default

tags: ["CAVIO", "Data Weighting"]

seed: 42

model:
  criterion:
    _target_: src.losses.weighted_loss.DataWeightedRPMGPoseLoss
    base_loss_fn:
      _target_: torch.nn.L1Loss
      reduction: none
    angle_weight: 25
  tester:
    plot_label: "CAVIO Data Weighting"