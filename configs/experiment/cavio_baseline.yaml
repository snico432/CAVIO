# @package _global_
#
# CAVIO-only experiment preset (same Hydra override role as VIFT `configs/experiment/*.yaml`;
# https://github.com/ybkurt/vift). Not present in upstream VIFT.

# CAVIOPoseTransformer baseline with VIFT-like widths: d_model=768, d_ff=128, nhead=6, angle_weight=40.
# To run (from repo root):
#   python src/train.py experiment=cavio_baseline trainer=gpu

defaults:
  - override /data: latent_kitti_vio
  - override /model: cavio
  - override /callbacks: default
  - override /trainer: default

tags: ["CAVIO", "Baseline"]

seed: 42

model:
  tester:
    plot_label: "CAVIO Baseline (d_model=768, d_ff=128)"
  net:
    embedding_dim: 768 # Same embedding dim as VIFT
    nhead: 6 # Same nhead as VIFT
    dim_feedforward: 128 # Same dim_feedforward as VIFT

  criterion:
    angle_weight: 40 # Same angle weight as VIFT