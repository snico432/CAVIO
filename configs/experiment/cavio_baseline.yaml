# @package _global_

# CrossAttnPoseTransformer: IMU cross-attends to visual, ffn_cross, then IMU self-attn + FFN.
# To run:
#   python src/train.py experiment=cross_attn_extra_ffn

defaults:
  - override /data: latent_kitti_vio
  - override /model: cavio
  - override /callbacks: default
  - override /trainer: default

tags: ["CAVIO", "Baseline"]

seed: 42

model:
  tester:
    plot_label: "CAVIO Baseline (d_model=768, d_ff=128)"
  net:
    embedding_dim: 768 # Same embedding dim as VIFT
    nhead: 6 # Same nhead as VIFT
    dim_feedforward: 128 # Same dim_feedforward as VIFT

  criterion:
    angle_weight: 40 # Same angle weight as VIFT