# @package _global_
#
# CAVIO-only experiment preset (same Hydra override role as VIFT `configs/experiment/*.yaml`;
# https://github.com/ybkurt/vift). Not present in upstream VIFT.

# CAVIO with d_model=512 (from `model/cavio`); only `dim_feedforward` swept to 2048.
# To run (from repo root):
#   python src/train.py experiment=cross_attn_d512_ff2048 trainer=gpu

defaults:
  - override /data: latent_kitti_vio
  - override /model: cavio
  - override /callbacks: default
  - override /trainer: default

tags: ["CAVIO", "Cross-Attention", "d512", "d_ff2048"]

seed: 42

model:
  net:
    dim_feedforward: 2048
  tester:
    plot_label: "Cross-Attention (d_model=512, d_ff=2048)"
