# @package _global_
#
# CAVIO-only experiment preset (same Hydra override role as VIFT `configs/experiment/*.yaml`;
# https://github.com/ybkurt/vift). Not present in upstream VIFT.

# Default CAVIOPoseTransformer with `CustomWeightedPoseLoss` (higher weight on vertical translation).
# To run (from repo root):
#   python src/train.py experiment=cavio_custom_pose_loss trainer=gpu

defaults:
  - override /data: latent_kitti_vio
  - override /model: cavio
  - override /callbacks: default
  - override /trainer: default

tags: ["CAVIO", "Custom pose loss"]

seed: 42

model:
  criterion:
    _target_: src.losses.weighted_loss.CustomWeightedPoseLoss
    base_loss_fn:
      _target_: torch.nn.L1Loss
      reduction: mean
    angle_weight: 25
    rot_w: [1.0, 1.0, 1.0]
    trans_w: [1.0, 2.5, 1.0]
  tester:
    plot_label: "CAVIO custom pose loss"
