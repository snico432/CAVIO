# @package _global_
#
# CAVIO-only experiment preset (same Hydra override role as VIFT `configs/experiment/*.yaml`;
# https://github.com/ybkurt/vift). Not present in upstream VIFT.

# Explicit d_model=512, d_ff=1024, all dropouts 0 (matches default `configs/model/cavio.yaml` net sizes).
# To run (from repo root):
#   python src/train.py experiment=cross_attn_d512_ff1024 trainer=gpu

defaults:
  - override /data: latent_kitti_vio
  - override /model: cavio
  - override /callbacks: default
  - override /trainer: default

tags: ["CAVIO", "Cross-Attention", "d512", "d_ff1024", "explicit"]

seed: 42

model:
  net:
    embedding_dim: 512
    nhead: 8
    dim_feedforward: 1024
    attn_dropout: 0.0
    residual_dropout: 0.0
    ffn_dropout: 0.0
  tester:
    plot_label: "Cross-Attention (d_model=512, d_ff=1024)"
