# Adapted from VIFT (https://github.com/ybkurt/vift) `configs/callbacks/default.yaml`.
# CAVIO: `early_stopping` is not included in this defaults group (use `callbacks/early_stopping.yaml` explicitly).

defaults:
  - model_checkpoint
  - model_summary
  - rich_progress_bar
  # - early_stopping Include if you want to use early stopping
  - _self_

model_checkpoint:
  dirpath: ${paths.output_dir}/checkpoints
  filename: "epoch_{epoch:03d}"
  monitor: "val/loss"
  mode: "min"
  save_last: True
  auto_insert_metric_name: False

model_summary:
  max_depth: -1
